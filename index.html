<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wszystkiego Najlepszego Tymek! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:    #ff6b9d;
      --yellow:  #ffe066;
      --orange:  #ff9b3d;
      --blue:    #5bc8f5;
      --purple:  #c084fc;
      --green:   #6ee7a0;
      --cream:   #fff8f0;
      --dark:    #2d1a4b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Baloo 2', cursive;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, #ffe8f7 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 0%, #e8f4ff 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 20% 0%, #fff3e0 0%, transparent 60%),
        var(--cream);
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .scene {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7vw, 5.5rem);
      color: var(--dark);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
      animation: titleIn 1s cubic-bezier(.34,1.56,.64,1) both;
      letter-spacing: .02em;
      position: relative;
    }
    .title span {
      display: inline-block;
      background: linear-gradient(135deg, var(--pink), var(--orange), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes titleIn {
      from { opacity: 0; transform: translateY(-40px) scale(.8); }
      to   { opacity: 1; transform: none; }
    }

    /* ── SUBTITLE ── */
    .sub {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 5vw, 3.8rem);
      color: var(--purple);
      text-align: center;
      animation: titleIn 1s .2s cubic-bezier(.34,1.56,.64,1) both;
      margin-bottom: clamp(12px, 3vw, 28px);
    }

    /* ── CAKE WRAPPER ── */
    .cake-wrap {
      animation: cakeIn 1.1s .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cakeIn {
      from { opacity: 0; transform: scale(.4) rotate(-8deg); }
      to   { opacity: 1; transform: none; }
    }

    /* ── SVG CAKE ── */
    #cake-svg {
      width: clamp(240px, 50vw, 480px);
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(180,80,160,.25));
    }

    /* candle flames */
    .flame { transform-origin: center bottom; }
    @keyframes flicker1 {
      0%,100%{ transform: scaleX(1)   scaleY(1)   rotate(0deg); }
      25%    { transform: scaleX(.85) scaleY(1.15) rotate(-4deg); }
      50%    { transform: scaleX(1.1) scaleY(.9)  rotate(3deg); }
      75%    { transform: scaleX(.9)  scaleY(1.1) rotate(-2deg); }
    }
    @keyframes flicker2 {
      0%,100%{ transform: scaleX(1)   scaleY(1)   rotate(0deg); }
      33%    { transform: scaleX(1.1) scaleY(.88) rotate(5deg); }
      66%    { transform: scaleX(.88) scaleY(1.1) rotate(-3deg); }
    }
    .f1 { animation: flicker1 .7s ease-in-out infinite; }
    .f2 { animation: flicker2 .9s .15s ease-in-out infinite; }
    .f3 { animation: flicker1 .6s .3s ease-in-out infinite; }
    .f4 { animation: flicker2 .8s .05s ease-in-out infinite; }
    .f5 { animation: flicker1 .75s .2s ease-in-out infinite; }
    .f6 { animation: flicker2 .65s .1s ease-in-out infinite; }
    .f7 { animation: flicker1 .85s .35s ease-in-out infinite; }
    .f8 { animation: flicker2 .7s .25s ease-in-out infinite; }
    .f9 { animation: flicker1 .6s .4s ease-in-out infinite; }
    .f10{ animation: flicker2 .8s .05s ease-in-out infinite; }

    /* cake bounce */
    #cake-svg { animation: cakeFloat 4s ease-in-out infinite; }
    @keyframes cakeFloat {
      0%,100%{ filter: drop-shadow(0 20px 40px rgba(180,80,160,.25)); transform: translateY(0); }
      50%    { filter: drop-shadow(0 30px 50px rgba(180,80,160,.35)); transform: translateY(-10px); }
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10;
    }

    /* ── STARS / SPARKLES ── */
    .sparkle {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      animation: sparklePop var(--dur) var(--delay) ease-out infinite;
    }
    @keyframes sparklePop {
      0%   { opacity: 0; transform: scale(0); }
      20%  { opacity: 1; transform: scale(1.4); }
      60%  { opacity: .8; }
      100% { opacity: 0; transform: scale(.2) translateY(-20px); }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

  <p class="sub">🎉 Tymek! 🎉</p>

      <path d="M80 220 Q90 232 100 220 Q110 232 120 220 Q130 232 140 220 Q150 232 160 220 Q170 232 180 220 Q190 232 200 220 Q210 232 220 220 Q230 232 240 220 Q250 232 260 220 Q270 232 280 220 Q290 232 300 220 Q310 232 320 220" fill="#fff8f0"/>

      <!-- frosting drips mid -->
      <path d="M100 155 Q110 167 120 155 Q130 167 140 155 Q150 167 160 155 Q170 167 180 155 Q190 167 200 155 Q210 167 220 155 Q230 167 240 155 Q250 167 260 155 Q270 167 280 155 Q290 167 300 155" fill="#fff8f0"/>

      <!-- ── TOP TIER ── -->
      <rect x="125" y="95" width="150" height="65" rx="8" fill="#c084fc"/>
      <ellipse cx="200" cy="95" rx="75" ry="9" fill="#d4a0ff"/>

      <!-- hearts top -->
      <text x="148" y="135" font-size="22" fill="#ff6b9d">♥</text>
      <text x="183" y="128" font-size="16" fill="#ffe066">♥</text>
      <text x="213" y="138" font-size="20" fill="#fff" opacity=".9">♥</text>
      <!-- frosting drips top -->
      <path d="M133 95 Q140 106 147 95 Q154 106 161 95 Q168 106 175 95 Q182 106 189 95 Q196 106 203 95 Q210 106 217 95 Q224 106 231 95 Q238 106 245 95 Q252 106 259 95 Q266 106 273 95" fill="#fff8f0"/>

      <!-- "10" on cake -->
      <text x="175" y="145" font-family="Fredoka One, cursive" font-size="30" fill="#fff" opacity=".95" text-anchor="middle">10</text>

      <!-- ── CANDLES (10) ── -->
      <!-- candle body + flame helper -->
      <!-- positions: x values for 10 candles spread across top -->
      <!-- row of 10 candles above top tier -->

      <!-- candle 1 -->
      <rect x="136" y="64" width="10" height="33" rx="4" fill="#ff6b9d"/>
      <ellipse cx="141" cy="65" rx="5" ry="3" fill="#ff9b3d"/>
      <g class="flame f1"><ellipse cx="141" cy="58" rx="5" ry="8" fill="#ffe066" opacity=".9"/>

      <rect x="150" y="60" width="10" height="37" rx="4" fill="#ffe066"/>

      <!-- candle 5 -->
      <rect x="192" y="61" width="10" height="36" rx="4" fill="#ff9b3d"/>

      <g class="flame f5"><ellipse cx="197" cy="55" rx="5" ry="8" fill="#ffe066" opacity=".9"/>

    </svg>
  </div>
</div>

<!-- sparkles -->
<script>
  // ── SPARKLES ──
  const colors = ['#ff6b9d','#ffe066','#5bc8f5','#c084fc','#6ee7a0','#ff9b3d'];
  for(let i = 0; i < 18; i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.cssText = `
      left:${Math.random()*100}vw;
      top:${Math.random()*100}vh;
      background:${colors[i%colors.length]};
      --dur:${1.5+Math.random()*2.5}s;
      --delay:${Math.random()*3}s;
      width:${4+Math.random()*8}px;
      height:${4+Math.random()*8}px;
    `;
    document.body.appendChild(s);
  }

  // ── CONFETTI ──
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');

  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#ff6b9d','#ffe066','#5bc8f5','#c084fc','#6ee7a0','#ff9b3d','#fff','#ff4444'];
  const SHAPES = ['rect','circle','tri'];

  class Piece {
    constructor(burst){
      this.reset(burst);
    }
    reset(burst){
      if(burst){
        this.x = canvas.width / 2 + (Math.random()-0.5)*200;
        this.y = canvas.height * 0.35 + (Math.random()-0.5)*80;
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 10;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 6;
      } else {
        this.x = Math.random() * canvas.width;
        this.y = -20;
        this.vx = (Math.random()-0.5) * 3;
        this.vy = 2 + Math.random() * 4;
      }
      this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
      this.shape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
      this.size  = 6 + Math.random() * 10;
      this.rot   = Math.random() * Math.PI * 2;
      this.rotV  = (Math.random()-0.5) * 0.18;
      this.alpha = 1;
      this.alive = true;
    }
    update(){
      this.x  += this.vx;
      this.y  += this.vy;
      this.vy += 0.18;          // gravity
      this.vx *= 0.995;
      this.rot += this.rotV;
      if(this.y > canvas.height + 30) this.alive = false;
    }
    draw(){
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;
      if(this.shape === 'rect'){
        ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
      } else if(this.shape === 'circle'){
        ctx.beginPath();
        ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -this.size/2);
        ctx.lineTo(this.size/2, this.size/2);
        ctx.lineTo(-this.size/2, this.size/2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  let pieces = [];

  // initial burst
  for(let i=0;i<120;i++) pieces.push(new Piece(true));
  // then trickle
  setInterval(()=>{
    for(let i=0;i<3;i++) pieces.push(new Piece(false));
    pieces = pieces.filter(p=>p.alive);
  }, 200);

  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
